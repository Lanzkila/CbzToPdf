<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual App Desktop &amp; HP Sync</title>
    
    <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #202124; font-family: sans-serif; }
    body { display: flex; flex-direction: column; }

    /* Header & Address Bar */
    .app-header { background: #35363a; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #1c1c1e; flex-shrink: 0; }
    
    /* Logik HP: Sembunyi input tak aktif. Logik Desktop: Tunjuk yang dipilih sahaja */
    .address-bar { flex: 1; display: none; align-items: center; background: #202124; padding: 8px 15px; border-radius: 20px; border: 1px solid #5f6368; animation: fadeIn 0.3s; }
    .address-bar.active-input { display: flex; }
    .address-bar input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 14px; }
    .address-bar span { color: #8ab4f8; font-size: 11px; font-weight: bold; margin-right: 10px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Workspace */
    .workspace { flex-grow: 1; display: flex; background: #000; position: relative; overflow: hidden; gap: 4px; }
    .pane { flex: 1; background: #fff; display: flex; flex-direction: column; position: relative; transition: 0.3s; border: 4px solid transparent; border-radius: 8px; overflow: hidden; margin: 2px; }
    
    /* Highlight pane yang aktif di Desktop */
    .pane.active-pane { border: 4px solid #8ab4f8; box-shadow: 0 0 15px rgba(138, 180, 248, 0.4); }
    iframe { width: 100%; height: 100%; border: none; background: #fff; pointer-events: auto; }

    /* Bottom Nav (Wajib ada untuk HP & Desktop Switcher) */
    .bottom-nav { display: flex; background: #35363a; border-top: 1px solid #1c1c1e; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; }
    .nav-item { flex: 1; color: #9aa0a6; display: flex; align-items: center; justify-content: center; padding: 15px 0; font-size: 14px; font-weight: bold; cursor: pointer; border-right: 1px solid #202124; }
    .nav-item.active { color: #8ab4f8; background: rgba(138, 180, 248, 0.1); border-bottom: 3px solid #8ab4f8; }

    /* RESPONSIVE: Di HP, sorok pane yang tak aktif */
    @media (max-width: 768px) {
      .pane { display: none; position: absolute; inset: 0; }
      .pane.active-pane { display: flex; }
      .workspace { gap: 0; }
    }

      .pane::before { content: 'TAB ACTIVE'; position: absolute; top: 10px; right: 10px; background: #8ab4f8; color: #202124; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 4px; display: none; z-index: 10; }
      .pane.active-pane::before { display: block; }

      ::-webkit-scrollbar { width: 8px; height: 8px; background-color: #202124; }
      ::-webkit-scrollbar-track { background: #2b2c2f; border-radius: 10px; }
      ::-webkit-scrollbar-thumb { background: #5f6368; border-radius: 10px; border: 2px solid #2b2c2f; }
      ::-webkit-scrollbar-thumb:hover { background: #8ab4f8; }
      * { scrollbar-width: thin; scrollbar-color: #5f6368 #2b2c2f; }

    .navbar, .quickedit, .item-control { display: none !important; }
    </style>
</head>
<body>

<div class='app-header'>
    <!-- Alamat Bar Dinamik -->
    <div class='address-bar active-input' id='bar1'>
      <span>TAB 1</span>
      <input autocomplete='off' id='input1' placeholder='Masukkan Link 1...' type='url'/>
    </div>
    <div class='address-bar' id='bar2'>
      <span>TAB 2</span>
      <input autocomplete='off' id='input2' placeholder='Masukkan Link 2...' type='url'/>
    </div>
  </div>

  <div class='workspace'>
    <!-- Klik pada pane untuk aktifkan input bar di atas (Desktop) -->
    <div class='pane active-pane' id='pane1' onclick='switchTab(1)'>
      <iframe id='frame1' src='about:blank'/>
    </div>
    <div class='pane' id='pane2' onclick='switchTab(2)'>
      <iframe id='frame2' src='about:blank'/>
    </div>
  </div>

  <!-- Menu Bawah (Wajib) -->
  <div class='bottom-nav'>
    <div class='nav-item active' id='btnTab1' onclick='switchTab(1)'>PANEL 1</div>
    <div class='nav-item' id='btnTab2' onclick='switchTab(2)'>PANEL 2</div>
  </div>

    <script>
    function switchTab(n) {
      // 1. Aktifkan Pane yang betul
      document.querySelectorAll(&#39;.pane&#39;).forEach(p =&gt; p.classList.remove(&#39;active-pane&#39;));
      document.getElementById(&#39;pane&#39;+n).classList.add(&#39;active-pane&#39;);
      
      // 2. Tukar Alamat Bar di Header (Satu sahaja aktif pada satu masa)
      document.querySelectorAll(&#39;.address-bar&#39;).forEach(b =&gt; b.classList.remove(&#39;active-input&#39;));
      document.getElementById(&#39;bar&#39;+n).classList.add(&#39;active-input&#39;);
      
      // 3. Tukar Status Button Menu
      document.querySelectorAll(&#39;.nav-item&#39;).forEach(i =&gt; i.classList.remove(&#39;active&#39;));
      document.getElementById(&#39;btnTab&#39;+n).classList.add(&#39;active&#39;);
      
      // Auto-focus ke input supaya boleh terus taip
      document.getElementById(&#39;input&#39;+n).focus();
    }

    // Logik Enter yang Diasingkan
    function bindInput(inputId, frameId) {
      document.getElementById(inputId).addEventListener(&#39;keydown&#39;, function(e) {
        if (e.key === &#39;Enter&#39;) {
          e.preventDefault();
          let val = this.value.trim();
          if (val) {
            if (!/^https?:\/\//i.test(val)) val = &#39;https://&#39; + val;
            document.getElementById(frameId).src = val;
            this.blur();
          }
        }
      });
    }

    window.onload = function() {
      bindInput(&#39;input1&#39;, &#39;frame1&#39;);
      bindInput(&#39;input2&#39;, &#39;frame2&#39;);
    };
    </script>

</body>
</html>
