<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk ZIP to PDF - Modern</title>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F9FAFB;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 1rem; shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; }
        
        /* Dropzone Styling */
        .dropzone {
            border: 2px dashed #D1D5DB;
            border-radius: 0.75rem;
            padding: 3rem 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            background: #ffffff;
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: var(--primary);
            background: #F5F3FF;
        }
        .dropzone svg { width: 48px; height: 48px; color: #9CA3AF; margin-bottom: 1rem; transition: color 0.3s; }
        .dropzone:hover svg { color: var(--primary); }
        
        input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        
        button {
            margin-top: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: var(--primary-hover); }
        #status { margin-top: 1rem; font-size: 0.875rem; color: #6B7280; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-bottom: 0.5rem;">ZIP to PDF Converter</h2>
    <p style="color: #6B7280; margin-bottom: 2rem;">Muat naik fail ZIP untuk tukar ke PDF secara pukal.</p>

    <div class="dropzone" id="dropzone">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://w3.org">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
        </svg>
        <p id="fileNameDisplay"><strong>Klik untuk muat naik</strong> atau seret fail ke sini</p>
        <p style="font-size: 0.75rem; color: #9CA3AF;">Sokongan: ZIP sahaja</p>
        <input type="file" id="fileInput" multiple accept=".zip">
    </div>

    <button onclick="processFiles()">Proses Sekarang</button>
    <div id="status"></div>
</div>

<script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const display = document.getElementById('fileNameDisplay');

    // Visual feedback semasa drag & drop
    ['dragenter', 'dragover'].forEach(e => dropzone.addEventListener(e, () => dropzone.classList.add('dragover'), false));
    ['dragleave', 'drop'].forEach(e => dropzone.addEventListener(e, () => dropzone.classList.remove('dragover'), false));

    fileInput.onchange = () => {
        const count = fileInput.files.length;
        display.innerHTML = count > 0 ? `<strong>${count} fail dipilih</strong>` : "Klik untuk muat naik atau seret fail";
    };

    async function processFiles() {
        const status = document.getElementById('status');
        const files = fileInput.files;
        if (files.length === 0) return alert("Sila pilih fail!");

        status.innerText = "⏳ Sedang menukar...";
        
        for (let i = 0; i < files.length; i++) {
            const zipFile = files[i];
            const zipName = zipFile.name.replace(".zip", "");
            try {
                const zip = await JSZip.loadAsync(zipFile);
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                let hasImages = false;

                const fileKeys = Object.keys(zip.files);
                for (const filename of fileKeys) {
                    if (filename.match(/\.(jpg|jpeg|png)$/i)) {
                        const imgData = await zip.files[filename].async("base64");
                        if (hasImages) doc.addPage();
                        doc.addImage(`data:image/jpeg;base64,${imgData}`, 'JPEG', 10, 10, 190, 0);
                        hasImages = true;
                    }
                }
                if (hasImages) doc.save(`${zipName}.pdf`);
            } catch (err) { console.error(err); }
        }
        status.innerText = "✅ Selesai!";
    }
</script>

</body>
</html>
