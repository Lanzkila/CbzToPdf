<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nama Converter Anda</title>
    <link href='https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap' rel='stylesheet'/>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'/>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'/>
        
    <style>
body {
  background: #f0f2f5; font-family: 'Roboto', sans-serif;
  margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
}
/* Gambar background manga tipis */
body::before {
  content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: url('https://d378pye9mzk55i.cloudfront.net/Image20241212182458.jpg'); background-size: cover; opacity: 0.1; z-index: -1;
}

.converter-card {
  background: #ffffff; width: 90%; max-width: 500px;
  padding: 35px; border-radius: 8px; box-shadow: 0 4px 25px rgba(0,0,0,0.1);
  text-align: center; box-sizing: border-box;
}

h1 { color: #3c4858; font-size: 28px; margin: 0 0 10px 0; font-weight: 700; }
.desc { color: #6c757d; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }

.radio-group { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
.radio-group label { display: flex; align-items: center; cursor: pointer; font-weight: 500; color: #444; }
.radio-group input { margin-right: 8px; accent-color: #5d5fef; transform: scale(1.1); }

.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; margin-bottom: 25px; }
.input-field label { display: block; font-size: 13px; color: #555; font-weight: 700; margin-bottom: 8px; }
.input-field input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }

.file-label-text { text-align: left; display: block; font-size: 13px; font-weight: 700; color: #555; margin-bottom: 8px; }
.file-row {
  display: flex; align-items: center; background: #f8f9fa; 
  border-radius: 8px; padding: 5px; border: 1px solid #e9ecef; margin-bottom: 25px; height: 45px;
}
.btn-choose {
  background: #5d5fef; color: white; padding: 10px 22px; border-radius: 6px;
  cursor: pointer; font-weight: 700; font-size: 13px; white-space: nowrap;
}
#fileNameDisplay {
  font-size: 13px; color: #6c757d; padding: 0 15px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; text-align: left;
}

.btn-convert {
  background: #5d5fef; color: white; border: none; width: 100%;
  padding: 16px; border-radius: 6px; font-size: 16px; font-weight: 700;
  cursor: pointer; text-transform: uppercase;
}

#statusArea { margin-top: 15px; font-size: 14px; color: #444; text-align: left; font-weight: 500; }
.success-bar {
  display: none; background: #4ade80; color: #064e3b; padding: 12px 15px;
  border-radius: 6px; margin-top: 20px; text-align: left; font-size: 14px;
}
    </style>
</head>
<body>

<div class='converter-card'>
  <h1>Comic Book Converter</h1>
  <p class='desc'>Transform CBZ files into PDFs or EPUBs for your Kindle or any other e-reader. Everything happens in your browser!</p>

  <div class='radio-group'>
    <label><input checked='checked' name='format' type='radio' value='pdf'/> PDF</label>
    <label><input name='format' type='radio' value='epub'/> EPUB</label>
  </div>

  <div class='input-grid'>
    <div class='input-field'>
      <label>Image Width</label>
      <input id='imgWidth' type='number' value='1200'/>
    </div>
    <div class='input-field'>
      <label>Image Quality</label>
      <input id='imgQuality' type='number' value='72'/>
    </div>
  </div>

  <label class='file-label-text'>Upload CBZ File</label>
  <div class='file-row'>
    <label class='btn-choose' for='fileInput'>Choose File</label>
    <span id='fileNameDisplay'>No file chosen</span>
    <input accept='.cbz,.zip' id='fileInput' style='display:none' type='file'/>
  </div>

  <button class='btn-convert' id='convertBtn'>Convert</button>

  <div id='statusArea' style='display:none'>
    Processing: <span id='percentText'>0%</span>
  </div>

  <div class='success-bar' id='successBar'>
    &#10003; <a href='#' id='downloadLink' style='color:#064e3b; font-weight:700;'>Click here</a> to download your file.
  </div>
</div>

    <script>
let selectedFile = null;

document.getElementById('fileInput').onchange = (e) => {
  selectedFile = e.target.files[0];
  if(selectedFile) document.getElementById('fileNameDisplay').innerText = selectedFile.name;
};

document.getElementById('convertBtn').onclick = async function() {
  if(!selectedFile) return alert('Pilih fail CBZ dulu!');
  const format = document.querySelector('input[name="format"]:checked').value;
  const statusArea = document.getElementById('statusArea');
  const successBar = document.getElementById('successBar');
  const percentText = document.getElementById('percentText');
  const width = parseInt(document.getElementById('imgWidth').value);
  const quality = parseInt(document.getElementById('imgQuality').value) / 100;

  this.disabled = true;
  statusArea.style.display = 'block';
  successBar.style.display = 'none';

  try {
    const zipLoader = await JSZip.loadAsync(selectedFile);
    const files = Object.keys(zipLoader.files)
      .filter(f => f.match(/\.(jpg|jpeg|png|webp)$/i))
      .sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));
    
    if (format === 'pdf') {
        const { jsPDF } = window.jspdf;
        let pdf = null;

        for (let i = 0; i < files.length; i++) {
          const data = await zipLoader.files[files[i]].async("blob");
          const url = URL.createObjectURL(data);
          const img = new Image();
          await new Promise(r => { img.onload = r; img.src = url; });

          const h = (img.height / img.width) * width;
          if (i === 0) {
            pdf = new jsPDF({ unit: "px", format: [width, h] });
          } else {
            pdf.addPage([width, h], 'p');
          }
          pdf.addImage(img, 'JPEG', 0, 0, width, h, undefined, 'FAST');
          URL.revokeObjectURL(url);
          percentText.innerText = Math.round(((i + 1) / files.length) * 100) + '%';
        }
        finishDownload(pdf.output('blob'), selectedFile.name.replace('.cbz', '.pdf'));
    } else {
        const epubZip = new JSZip();
        // Wajib: mimetype tanpa compression
        epubZip.file("mimetype", "application/epub+zip", { compression: "STORE" });
        
        const oebps = epubZip.folder("OEBPS");
        const imgFolder = oebps.folder("images");
        let manifest = "";
        let spine = "";

        for (let i = 0; i < files.length; i++) {
          const data = await zipLoader.files[files[i]].async("blob");
          const imgName = `p${i}.jpg`;
          imgFolder.file(imgName, data);
          manifest += `<item id="i${i}" href="images/${imgName}" media-type="image/jpeg"/>`;
          spine += `<itemref idref="i${i}"/>`;
          percentText.innerText = Math.round(((i + 1) / files.length) * 100) + '%';
        }

        epubZip.folder("META-INF").file("container.xml", '<?xml version="1.0"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>');
        
        oebps.file("content.opf", `<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" version="2.0" unique-identifier="id"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:title>Comic</dc:title><dc:language>en</dc:language></metadata><manifest>${manifest}</manifest><spine>${spine}</spine></package>`);
        
        const content = await epubZip.generateAsync({type:"blob", mimeType: "application/epub+zip"});
        finishDownload(content, selectedFile.name.replace('.cbz', '.epub'));
    }
  } catch (e) { alert('Error: ' + e.message); }
  this.disabled = false;
  statusArea.style.display = 'none';
};

function finishDownload(blob, name) {
    const url = URL.createObjectURL(blob);
    const dl = document.getElementById('downloadLink');
    dl.href = url;
    dl.download = name;
    document.getElementById('successBar').style.display = 'block';
}
    </script>

</body>
</html>
