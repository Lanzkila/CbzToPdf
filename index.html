<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nama Converter Anda</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; width: 100%; }

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: #0ff; border-radius: 10px; }
* { scrollbar-width: thin; scrollbar-color: #0ff #000; }

#main-container { width: 90%; max-width: 420px; background: #111; padding: 25px; border-radius: 40px; border: 2px solid #0ff; box-shadow: 0 0 25px rgba(0,255,255,0.2); text-align: center; position: relative; }

/* Display & Screen */
.display-screen { width: 100%; height: 230px; background: #000; border-radius: 25px; margin-bottom: 20px; overflow: hidden; border: 1px solid #222; position: relative; }
#player-yt { width: 100%; height: 100%; border: none; display: none; }
#radio-visual { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; display:flex; flex-direction: column; align-items:center; justify-content:center; }
.v-ring { width: 90px; height: 90px; border: 4px solid #0ff; border-radius: 50%; box-shadow: 0 0 20px #0ff; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { transform: scale(1); opacity:1; } 50% { transform: scale(1.1); opacity:0.6; } 100% { transform: scale(1); opacity:1; } }

/* Meta Info */
#meta-shelf { background: #1a1a1a; padding: 18px; border-radius: 25px; margin-bottom: 15px; border: 1px solid #333; text-align: left; }
#track-title { color: #0ff; font-weight: bold; font-size: 15px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#track-artist { color: #888; font-size: 11px; display: block; margin: 4px 0 12px 0; }
.progress-container { width: 100%; height: 5px; background: #222; border-radius: 10px; overflow: hidden; }
#progress-bar { width: 0%; height: 100%; background: #0ff; box-shadow: 0 0 10px #0ff; transition: 0.3s; }
.time-info { display: flex; justify-content: space-between; font-size: 10px; color: #0ff; margin-top: 6px; font-family: monospace; }

/* Input Group */
.input-group { background: #1a1a1a; padding: 8px; border-radius: 20px; display: flex; border: 1px solid #333; margin-bottom: 15px; align-items: center; }
input { background: transparent; border: none; color: #fff; flex: 1; outline: none; padding-left: 15px; font-size: 13px; }
.btn-load { background: #0ff; border: none; width: 40px; height: 40px; border-radius: 14px; cursor: pointer; color: #000; font-weight: bold; display: flex; align-items: center; justify-content: center; }

/* NEW PLAYER CONTROLS */
.controls-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 5px; }
.ctrl-btn { background: transparent; border: 1px solid rgba(0,255,255,0.3); color: #0ff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; }
.ctrl-btn:hover { background: rgba(0,255,255,0.1); border-color: #0ff; }
#main-play-btn { width: 55px; height: 55px; font-size: 24px; background: #0ff; color: #000; border: none; box-shadow: 0 0 15px rgba(0,255,255,0.4); }

/* Floating Playlist Trigger */
.playlist-trigger { position: fixed; bottom: 25px; right: 25px; background: #0ff; color: #000; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; font-size: 22px; box-shadow: 0 0 15px #0ff; border: none; }

/* Drawer */
#drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%; background: rgba(10,10,10,0.98); border-top: 2px solid #0ff; border-radius: 30px 30px 0 0; z-index: 2000; transition: 0.4s ease; padding: 25px; box-sizing: border-box; backdrop-filter: blur(10px); }
#drawer.open { bottom: 0; }
.drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.drawer-close { background: transparent; border: none; color: #0ff; font-size: 30px; cursor: pointer; }
#list-items { overflow-y: auto; height: calc(100% - 60px); text-align: left; }
.song-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; font-size: 14px; border-radius: 8px; }
.song-item.active { color: #0ff; background: rgba(0,255,255,0.05); }

.player-footer { font-size: 10px; color: #444; letter-spacing: 1px; text-transform: uppercase; margin-top: 15px; }
.player-footer span { color: #0ff; opacity: 0.6; }
    </style>
</head>
<body>

<div id="main-container">
  <div class="display-screen">
    
    <div id="player-yt"></div>
    
    <div id="radio-visual">
      <div class="v-ring"></div>
      <span id="live-tag" style="color:#0ff; font-size:10px; margin-top:15px; letter-spacing:2px; display:none;">
        LIVE STREAMING
      </span>
    </div>

  </div>
</div>
    
    <div id='meta-shelf'>
      <span id='track-title'>Ready...</span>
      <span id='track-artist'>YouTube / MP3 / Radio</span>
      <div class='progress-container'><div id='progress-bar'/></div>
      <div class='time-info'>
        <span id='cur-time'>0:00</span>
        <span id='total-time'>0:00</span>
      </div>
    </div>
    
    <div class='input-group'>
      <input id='url-in' onkeydown='if(event.keyCode==13) playKirin()' placeholder='Paste Link &amp; Enter...' type='text'/>
      <button class='btn-load' onclick='playKirin()'>GO</button>
    </div>

    <div class='controls-row'>
      <button class='ctrl-btn' onclick='prevTrack()'>&#10094;&#10094;</button>
      <button class='ctrl-btn' id='main-play-btn' onclick='togglePlay()'>&#9654;</button>
      <button class='ctrl-btn' onclick='nextTrack()'>&#10095;&#10095;</button>
    </div>

    <div class='player-footer'>
      &#169; <span id='year-display'/> Kirin | All right Reserved
    </div>

    <audio id='aud-engine' ontimeupdate='updateAudio()'/>
  </div>

  <button class='playlist-trigger' onclick='toggleDrawer()'>&#9776;</button>

  <div id='drawer'>
    <div class='drawer-header'>
      <h3 style='margin:0; color:#0ff;'>Playlist</h3>
      <button class='drawer-close' onclick='toggleDrawer()'>&#215;</button>
    </div>
    <div id='list-items'>
       <div style='color:#444; text-align:center; padding-top:20px;'>No Playlist Loaded</div>
    </div>
  </div>

    <script>
var yt, timer;

    document.getElementById('year-display').innerHTML = new Date().getFullYear();

    window.addEventListener('keydown', function(e) {
      if(e.code === 'Space' && e.target.tagName !== 'INPUT') {
        e.preventDefault();
        togglePlay();
      }
    });

        // Fungsi wajib untuk API YouTube
      function onYouTubeIframeAPIReady() {
            console.log("YouTube API sedia");
        }

    function playKirin() {
      var u = document.getElementById('url-in').value;
      var a = document.getElementById('aud-engine');
      var r = document.getElementById('radio-visual');
      var y = document.getElementById('player-yt');
      var l = document.getElementById('live-tag');

      if(yt && yt.destroy) yt.destroy();
      clearInterval(timer);
      a.pause(); a.src = "";
      y.style.display = 'none'; r.style.display = 'flex'; l.style.display = 'none';
      resetUI();

      if(u.includes('youtube') || u.includes('youtu.be')) {
        y.style.display = 'block'; r.style.display = 'none';
        yt = new YT.Player('player-yt', {
          height: '100%', width: '100%',
          videoId: getID(u),
          playerVars: {
            'autoplay': 1,
            'listType': u.includes('list=') ? 'playlist' : null,
            'list': getParam(u, 'list')
          },
          events: {
            'onReady': syncYT, 
            'onStateChange': function(e) {
               syncYT();
               var btn = document.getElementById('main-play-btn');
               if(e.data === 1) { btn.innerHTML = '&#10074;&#10074;'; renderList(); } 
               else { btn.innerHTML = '&#9654;'; }
            }
          }
        });
      } else if(u !== "") {
        a.src = u; a.play();
        document.getElementById('main-play-btn').innerHTML = '&#10074;&#10074;';
        document.getElementById('track-title').innerHTML = "Streaming Audio";
        document.getElementById('track-artist').innerHTML = u.split('/')[2];
        if(u.includes('streamtheworld') || u.includes('.mp3?')) {
           l.style.display = 'block';
           document.getElementById('total-time').innerHTML = "LIVE";
        }
      }
      document.getElementById('url-in').blur();
    }

    function togglePlay() {
      var btn = document.getElementById('main-play-btn');
      if(yt && yt.getPlayerState) {
        var s = yt.getPlayerState();
        if(s == 1) { yt.pauseVideo(); btn.innerHTML = '&#9654;'; } 
        else { yt.playVideo(); btn.innerHTML = '&#10074;&#10074;'; }
      } else {
        var a = document.getElementById('aud-engine');
        if(a.paused) { a.play(); btn.innerHTML = '&#10074;&#10074;'; } 
        else { a.pause(); btn.innerHTML = '&#9654;'; }
      }
    }

    function nextTrack() { if(yt && yt.nextVideo) yt.nextVideo(); }
    function prevTrack() { if(yt && yt.previousVideo) yt.previousVideo(); }

    function syncYT() {
      if(timer) clearInterval(timer);
      timer = setInterval(() => {
        if(yt && yt.getVideoData) {
          var d = yt.getVideoData();
          document.getElementById('track-title').innerHTML = d.title || "Playing...";
          document.getElementById('track-artist').innerHTML = d.author || "YouTube Music";
          updateUI(yt.getCurrentTime(), yt.getDuration());
        }
      }, 1000);
    }

    function renderList() {
    if(yt && typeof yt.getPlaylist === 'function') {
        var list = yt.getPlaylist();
        var container = document.getElementById('list-items');
        var currentIndex = yt.getPlaylistIndex();
        
        if(list && list.length > 0) {
            container.innerHTML = "";
            list.forEach((id, index) => {
                var item = document.createElement('div');
                var isCurrent = (index === currentIndex);
                item.className = 'song-item' + (isCurrent ? ' active' : '');
                
                // Menambah tajuk ringkas atau sekadar indeks
                item.innerHTML = (isCurrent ? "&#9658; " : "") + "Track " + (index + 1);
                
                item.onclick = function() { 
                    yt.playVideoAt(index); 
                    toggleDrawer(); 
                };
                container.appendChild(item);
            });
        }
    }
}

    function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }
    function updateAudio() {
      var a = document.getElementById('aud-engine');
      if(a.duration && a.duration !== Infinity) updateUI(a.currentTime, a.duration);
    }
    function updateUI(c, d) {
      if(!d) return;
      document.getElementById('progress-bar').style.width = (c/d*100) + "%";
      document.getElementById('cur-time').innerHTML = fTime(c);
      document.getElementById('total-time').innerHTML = fTime(d);
    }
    function fTime(s) {
      var m = Math.floor(s/60), sc = Math.floor(s%60);
      return m + ":" + (sc < 10 ? '0' : '') + sc;
    }
    function resetUI() {
      document.getElementById('progress-bar').style.width = "0%";
      document.getElementById('cur-time').innerHTML = "0:00";
      document.getElementById('total-time').innerHTML = "0:00";
    }
    function getID(u) {
      var reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      var m = u.match(reg);
      return (m && m[2].length == 11) ? m[2] : "";
    }
    function getParam(url, n) {
      var r = new RegExp("[\\?&]" + n + "=([^&#]*)"), res = r.exec(url);
      return res === null ? "" : decodeURIComponent(res[1].replace(/\+/g, " "));
    }
    </script>
</body>
</html>
